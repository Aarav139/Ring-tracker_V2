<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Rings Balancer</title>
    <style>
        :root {
            --bg: #000000;
            --surface: #111111;
            --surface-card: #1c1c1e;
            --text: #ffffff;
            --new-color: #ff3b30; /* Apple Red/Orange */
            --hw-color: #32ade6;  /* Apple Cyan */
            --old-color: #34c759; /* Apple Green */
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 900px;
            width: 100%;
        }
        h1 { text-align: center; margin-bottom: 5px; font-weight: 700; letter-spacing: 0.5px; }
        
        /* Dashboard & Rings */
        .dashboard {
            display: flex;
            flex-wrap: wrap;
            background: var(--surface);
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 25px;
            gap: 30px;
            align-items: center;
            justify-content: center;
        }
        .rings-container {
            position: relative;
            width: 250px;
            height: 250px;
        }
        svg { transform: rotate(-90deg); width: 100%; height: 100%; }
        circle { transition: stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .ring-bg { opacity: 0.2; }
        
        .ring-stats {
            flex-grow: 1;
            min-width: 200px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .time-settings {
            background: var(--surface-card);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .time-settings input {
            width: 60px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
        }
        .legend-item { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 15px; }
        .legend-dot { width: 14px; height: 14px; border-radius: 50%; }

        /* Inputs */
        .input-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 25px;
            background: var(--surface);
            padding: 15px;
            border-radius: 16px;
        }
        input, select, button {
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            background: var(--surface-card);
            color: white;
        }
        input:focus { box-shadow: 0 0 0 2px #555; }
        #taskInput { flex-grow: 3; min-width: 200px; }
        #durationInput { flex-grow: 1; min-width: 100px; }
        #categorySelect { flex-grow: 1; cursor: pointer; }
        button.add-btn { 
            background: #ffffff; 
            color: #000000; 
            cursor: pointer; 
            font-weight: 600;
            flex-grow: 1;
        }
        button.add-btn:hover { background: #e0e0e0; }

        /* Columns */
        .columns {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }
        .column { background: var(--surface); padding: 20px; border-radius: 16px; }
        .column h2 { margin-top: 0; font-size: 16px; font-weight: 700; padding-bottom: 12px; border-bottom: 2px solid; }
        #col-new h2 { border-color: var(--new-color); color: var(--new-color); }
        #col-hw h2 { border-color: var(--hw-color); color: var(--hw-color); }
        #col-old h2 { border-color: var(--old-color); color: var(--old-color); }
        
        .task {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin: 10px 0;
            padding: 12px;
            background: var(--surface-card);
            border-radius: 10px;
        }
        .task input[type="checkbox"] { width: 22px; height: 22px; cursor: pointer; accent-color: #fff; margin-top: 2px;}
        .task-content { flex-grow: 1; display: flex; flex-direction: column; }
        .task-text { font-size: 14px; line-height: 1.4; margin-bottom: 4px; }
        .task-time { font-size: 12px; color: #888; font-weight: 600; }
        .completed { opacity: 0.4; }
        .completed .task-text { text-decoration: line-through; }
        .delete-btn { background: transparent; color: #ff453a; padding: 4px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Study Rings</h1>
    
    <div class="dashboard">
        <div class="rings-container">
            <svg viewBox="0 0 250 250">
                <circle cx="125" cy="125" r="100" fill="none" stroke="var(--new-color)" stroke-width="18" class="ring-bg"/>
                <circle cx="125" cy="125" r="78" fill="none" stroke="var(--hw-color)" stroke-width="18" class="ring-bg"/>
                <circle cx="125" cy="125" r="56" fill="none" stroke="var(--old-color)" stroke-width="18" class="ring-bg"/>
                
                <circle id="ring-new" cx="125" cy="125" r="100" fill="none" stroke="var(--new-color)" stroke-width="18" stroke-dasharray="628" stroke-dashoffset="628" stroke-linecap="round"/>
                <circle id="ring-hw" cx="125" cy="125" r="78" fill="none" stroke="var(--hw-color)" stroke-width="18" stroke-dasharray="490" stroke-dashoffset="490" stroke-linecap="round"/>
                <circle id="ring-old" cx="125" cy="125" r="56" fill="none" stroke="var(--old-color)" stroke-width="18" stroke-dasharray="351" stroke-dashoffset="351" stroke-linecap="round"/>
            </svg>
        </div>
        
        <div class="ring-stats">
            <div class="time-settings">
                <label for="totalHours">Total Study Goal (Hours):</label>
                <input type="number" id="totalHours" value="6" min="1" max="24" onchange="updateSystem()">
            </div>
            
            <div class="legend-item">
                <div class="legend-dot" style="background: var(--new-color);"></div>
                <span id="stat-new">New Content: 0 / 120 min</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background: var(--hw-color);"></div>
                <span id="stat-hw">Homework: 0 / 120 min</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background: var(--old-color);"></div>
                <span id="stat-old">Old Content: 0 / 120 min</span>
            </div>
        </div>
    </div>

    <div class="input-group">
        <input type="text" id="taskInput" placeholder="What are you working on?" maxlength="100">
        <select id="categorySelect">
            <option value="new">New Content</option>
            <option value="hw">Homework</option>
            <option value="old">Old Content</option>
        </select>
        <input type="number" id="durationInput" placeholder="Mins (e.g. 45)" min="5" max="300">
        <button class="add-btn" onclick="addTask()">Add Task</button>
    </div>

    <div class="columns">
        <div class="column" id="col-new">
            <h2>New Content</h2>
            <div id="list-new"></div>
        </div>
        <div class="column" id="col-hw">
            <h2>Homework</h2>
            <div id="list-hw"></div>
        </div>
        <div class="column" id="col-old">
            <h2>Old Content</h2>
            <div id="list-old"></div>
        </div>
    </div>
</div>

<script>
    // State management
    let tasks = JSON.parse(localStorage.getItem('study_ring_tasks')) || [];
    let savedHours = localStorage.getItem('study_ring_hours');
    if(savedHours) document.getElementById('totalHours').value = savedHours;

    function saveState() {
        localStorage.setItem('study_ring_tasks', JSON.stringify(tasks));
        localStorage.setItem('study_ring_hours', document.getElementById('totalHours').value);
    }

    function addTask() {
        const text = document.getElementById('taskInput').value.trim();
        const cat = document.getElementById('categorySelect').value;
        const mins = parseInt(document.getElementById('durationInput').value);
        
        if (!text || isNaN(mins) || mins <= 0) {
            alert("Please enter a task and a valid duration in minutes.");
            return;
        }
        
        tasks.push({ id: Date.now(), text, cat, mins, done: false });
        
        document.getElementById('taskInput').value = '';
        document.getElementById('durationInput').value = '';
        updateSystem();
    }

    function toggleTask(id) {
        const task = tasks.find(t => t.id === id);
        if (task) task.done = !task.done;
        updateSystem();
    }

    function deleteTask(id) {
        tasks = tasks.filter(t => t.id !== id);
        updateSystem();
    }

    function updateSystem() {
        saveState();
        renderLists();
        updateRings();
    }

    function renderLists() {
        ['new', 'hw', 'old'].forEach(cat => {
            const list = document.getElementById(`list-${cat}`);
            list.innerHTML = '';
            
            const filtered = tasks.filter(t => t.cat === cat);
            filtered.forEach(task => {
                const div = document.createElement('div');
                div.className = `task ${task.done ? 'completed' : ''}`;
                div.innerHTML = `
                    <input type="checkbox" ${task.done ? 'checked' : ''} onchange="toggleTask(${task.id})">
                    <div class="task-content">
                        <span class="task-text">${escapeHtml(task.text)}</span>
                        <span class="task-time">${task.mins} mins</span>
                    </div>
                    <button class="delete-btn" onclick="deleteTask(${task.id})">✕</button>
                `;
                list.appendChild(div);
            });
        });
    }

    function updateRings() {
        const totalHours = parseFloat(document.getElementById('totalHours').value) || 6;
        const targetMinsPerCat = Math.round((totalHours * 60) / 3);

        const categories = [
            { id: 'new', circ: 628.3 },
            { id: 'hw', circ: 490.1 },
            { id: 'old', circ: 351.8 }
        ];

        categories.forEach(cat => {
            // Calculate completed minutes
            const doneMins = tasks
                .filter(t => t.cat === cat.id && t.done)
                .reduce((sum, t) => sum + t.mins, 0);

            // Update Text Legend
            document.getElementById(`stat-${cat.id}`).textContent = 
                `${document.getElementById(`stat-${cat.id}`).textContent.split(':')[0]}: ${doneMins} / ${targetMinsPerCat} min`;

            // Calculate SVG Offset
            // Cap the percentage at 1 (100%) so the ring doesn't overlap itself indefinitely
            const percentage = Math.min(doneMins / targetMinsPerCat, 1);
            const offset = cat.circ - (percentage * cat.circ);
            
            document.getElementById(`ring-${cat.id}`).style.strokeDashoffset = offset;
        });
    }

    function escapeHtml(str) {
        return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    // Initialize on load
    updateSystem();
</script>
</body>
</html>
